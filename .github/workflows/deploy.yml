name: Deploy to Apps Script
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install -g @google/clasp@3.3.0
      - name: Write credentials
        env:
          CLASP_CREDS_B64: ${{ secrets.CLASP_CREDENTIALS }}
        run: echo "$CLASP_CREDS_B64" | base64 -d > ~/.clasprc.json
      - run: clasp push --force
