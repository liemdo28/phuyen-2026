itinerary_edge_phrasings:
  - id: 16
    text: "lich tring ngay mai"
    intent: itinerary
    behavior: "Sai chính tả — matcher phải strip diacritic + tolerate typo"
    expected_contains: ["lịch", "mai"]
    expected_no_match: ["lỗi"]
    status: known_fail
    notes: " INTENT_KEYWORDS has 'lich trinh' — but input is 'lich tring'. Consider fuzzy match."

  - id: 17
    text: "LỊCH NGÀY MAI ĐÂU"
    intent: itinerary
    behavior: "All caps — normalize before matching"
    expected_contains: ["lịch", "mai"]
    expected_no_match: ["lỗi"]
    status: known_fail
    notes: "normalize_loose_text converts to lowercase, should work"

  - id: 18
