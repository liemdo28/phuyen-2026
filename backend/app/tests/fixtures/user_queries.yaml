# =============================================================================
# Test Corpus — Phú Yên Trip Bot (23–27/5/2026)
# =============================================================================
# Purpose: verify intent classifier, test bot crash-resistance, check reply
#          accuracy vs sheet data.
#
# Usage:
#   pytest tests/test_corpus_e2e.py -v
#   pytest tests/test_corpus_e2e.py -k "itinerary" --tb=short
#
# Each entry:
#   id          : sequential number (1–149+)
#   text        : raw user input
#   intent      : expected classified intent
#   behavior    : expected bot response summary
#   notes       : edge-case notes (typos, voice-to-text, etc.)
#   expected_contains    : substrings that MUST appear in response
#   expected_no_match     : substrings that MUST NOT appear (e.g. error messages)
#   status      : "pass_expected" | "known_fail" | "crash_expected"
# =============================================================================

# =============================================================================
# DOMAIN 1: ITINERARY (lịch trình ngày-giờ)
# =============================================================================

itinerary_happy_path:
  - id: 1
    text: "Lịch trình ngày mai có gì"
    intent: itinerary
    behavior: "Filter date = D+1, render HH:MM + activity"
    expected_contains: ["lịch", "ngày"]
    expected_no_match: ["lỗi", "exception", "Mình bị lỗi"]

  - id: 2
    text: "lịch hôm nay"
    intent: itinerary
    behavior: "Filter date = today"
    expected_contains: ["lịch", "hôm nay"]
    expected_no_match: ["lỗi"]

