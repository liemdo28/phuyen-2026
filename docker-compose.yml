version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /app/backend
    command: sh -c "pip install -e . && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/app
    env_file:
      - ./backend/.env.example
    environment:
      QUEUE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      DB_PATH: /app/backend/.state/telegram_ai.sqlite3
    depends_on:
      - redis
    ports:
      - "8000:8000"

  worker:
    image: python:3.12-slim
    working_dir: /app/backend
    command: sh -c "pip install -e . && python app/worker.py"
    volumes:
      - ./:/app
    env_file:
      - ./backend/.env.example
    environment:
      QUEUE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      DB_PATH: /app/backend/.state/telegram_ai.sqlite3
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"
